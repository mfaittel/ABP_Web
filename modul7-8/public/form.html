<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Form Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">CRUD App</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">Home</a>
                <a class="nav-link" href="data.html">Data Mahasiswa</a>
                <a class="nav-link active" href="form.html">Form Data</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 id="formTitle">Tambah Mahasiswa</h2>
        <form id="dataForm" class="mt-3">
            <input type="hidden" id="dataId">
            <div class="mb-3">
                <label>NIM</label>
                <input type="text" class="form-control" id="nim" required>
            </div>
            <div class="mb-3">
                <label>Nama Lengkap</label>
                <input type="text" class="form-control" id="nama" required>
            </div>
            <div class="mb-3">
                <label>Jurusan</label>
                <input type="text" class="form-control" id="jurusan" required>
            </div>
            <div class="mb-3">
                <label>IPK</label>
                <input type="number" step="0.01" min="0" max="4" class="form-control" id="ipk" required>
            </div>
            <button type="submit" class="btn btn-primary">Simpan</button>
            <a href="data.html" class="btn btn-secondary">Batal</a>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
