<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Praktikum ABP - Modul 5</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container mt-5">
    <h2 class="text-center mb-4">2311102310_Muhammad Faizul Humam</h2>

    <div class="row mb-4">
      <div class="col-sm-4 bg-primary text-white p-3">Kolom 1</div>
      <div class="col-sm-4 bg-warning text-dark p-3">Kolom 2</div>
      <div class="col-sm-4 bg-danger text-white p-3">Kolom 3</div>
    </div>

    <div class="row mb-4">
      <div class="col">
        <h3>Contoh Tabel Striped</h3>
        <table class="table table-striped table-hover">
          <thead class="table-dark">
            <tr>
              <th>No</th>
              <th>Kelas</th>
              <th>Jurusan</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>1</td>
              <td>04</td>
              <td>S1 Informatika</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="row mb-4 text-center">
      <div class="col">
        <h3>Images & Buttons</h3>
        <img src="i1.jpeg" class="img-fluid" alt="Contoh Gambar">
        <br>
        <button type="button" class="btn btn-success">Submit</button>
        <button type="button" class="btn btn-outline-primary">Outline</button>
        <button type="button" class="btn btn-danger btn-lg">Large Button</button>
      </div>
    </div>

    <div class="row mb-5">
      <div class="col-md-8 offset-md-2">
        <div class="card p-4 shadow">
          <h3 class="text-center">Horizontal Form</h3>
          <form action="#">
            <div class="row mb-3">
              <label for="uname" class="col-sm-3 col-form-label">Username:</label>
              <div class="col-sm-9">
                <input type="text" class="form-control" id="uname" placeholder="Enter username" name="uname">
              </div>
            </div>
            <div class="row mb-3">
              <label for="pwd" class="col-sm-3 col-form-label">Password:</label>
              <div class="col-sm-9">
                <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pwd">
              </div>
            </div>
            <div class="text-end">
              <button type="submit" class="btn btn-primary">Login</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
