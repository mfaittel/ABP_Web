<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Praktikum ABP - Modul 4</title>
  <style>
    h2 {
      text-align: left;
      font-family: Arial;
      font-size: 20px;
      color: lightgray;
      font-style: italic;
      font-weight: bold;
    }

    h1 {
      text-align: center;
    }

    .color-accent {
      color: #2F3CDF;
    }

    .section1 {
      background-color: lightgrey;
      padding: 10px 5px 10px 5px;
      color: maroon;
    }

    .mark {
      background-color: tomato;
      font-style: italic;
      font-weight: bold;
      padding: 10px;
      color: white;
    }

    .listsatu {
      background-color: tomato;
      margin: 10px 5px 10px 5px;
      list-style-type: lower-alpha;
      list-style-position: inside;
    }

    .listdua {
      background-color: lightblue;
      list-style-type: lower-roman;
      padding: 5px 5px 15px 15px;
      list-style-position: inside;
    }
  </style>
</head>
<body>

<h1>2311102310_Muhammad Faizul Humam</h1>
  <h2>contoh penerapan font properties</h2>

  <div class="section1">
    <h3>List of <span class="mark">Property</span></h3>
  </div>

  <ol type="1">
    <li>
      Indoor
      <ul class="listsatu">
        <li>Sofa</li>
      </ul>
      <ul class="listdua">
        <li>Tanaman Hias</li>
      </ul>
      <ul type="square">
        <li>Lampu Baca</li>
      </ul>
      <ul type="none">
        <li>Rak Buku</li>
      </ul>
    </li>
    <li>
      Outdoor
      <ol type="A">
        <li>Payung Pantai</li>
      </ol>
      <ol type="a">
        <li>Ayunan</li>
      </ol>
      <ol type="I">
        <li>Kursi Taman</li>
      </ol>
      <ol type="i">
        <li>Lampu Taman</li>
      </ol>
    </li>
  </ol>

</body>
</html>
