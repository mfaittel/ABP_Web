<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Praktikum ABP - Tugas3</title>
    <style>
        body {
            background-image: url('i2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            max-width: 800px;
        }

        .main-content {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .foto-box {
            width: 150px;
            height: 200px;
            border: 2px dashed #333;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #eee;
            text-align: center;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .foto-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .foto-box span {
            font-size: 12px;
            color: #777;
        }

        #upload_foto {
            display: none;
        }

        table td { padding: 5px; }

        input[type="text"], input[type="email"], input[type="password"], select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-group {
            margin-top: 15px;
            text-align: center;
        }

        .btn-kit {
            background-color: rgb(77, 77, 253);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2 style="text-align: center; color: #333;">Biodata</h2>
    
    <form action="#" method="POST" enctype="multipart/form-data">
        <div class="main-content">
            <label for="upload_foto" class="foto-box" id="drop-area">
                <span id="label-foto">Klik untuk<br>Upload Foto</span>
                <img id="preview-foto" src="" alt="Preview">
            </label>
            <input type="file" id="upload_foto" name="foto_input" accept="image/*" onchange="previewImage(event)">

            <table>
                <tr>
                    <td><label for="nama_id"><b>Nama</b></label></td>
                    <td>:</td>
                    <td><input type="text" name="nama_input" id="nama_id" value="Praktikan" /></td>
                </tr>
                <tr>
                    <td><label for="nim_id"><b>NIM</b></label></td>
                    <td>:</td>
                    <td><input type="text" name="nim_input" id="nim_id" value="NIM" /></td>
                </tr>
                <tr>
                    <td><label for="uname_id"><b>Username</b></label></td>
                    <td>:</td>
                    <td><input type="text" name="uname_input" id="uname_id" value="Praktikum" /></td>
                </tr>
                <tr>
                    <td><label for="email_id"><b>Email</b></label></td>
                    <td>:</td>
                    <td><input type="email" name="email_input" id="email_id" placeholder="Input Email" /></td>
                </tr>
                <tr>
                    <td><label for="password_id"><b>Password</b></label></td>
                    <td>:</td>
                    <td><input type="password" name="password_input" id="password_id" placeholder="Input Password" /></td>
                </tr>
            </table>
        </div>

        <table style="width: 100%;">
            <tr>
                <td width="130px"><b>Jenis Kelamin</b></td>
                <td width="10px">:</td>
                <td>
                    <input type="radio" name="jk_input" id="pria" value="Pria" /> <label for="pria">Pria</label>
                    <input type="radio" name="jk_input" id="wanita" value="Wanita" /> <label for="wanita">Wanita</label>
                </td>
            </tr>
            <tr>
                <td><b>Hobi</b></td>
                <td>:</td>
                <td>
                    <input type="checkbox" id="renang" /> <label for="renang">Renang</label>
                    <input type="checkbox" id="bersepeda" /> <label for="bersepeda">Bersepeda</label>
                    <input type="checkbox" id="memancing" /> <label for="memancing">Memancing</label>
                </td>
            </tr>
            <tr>
                <td><label for="jp_id"><b>Jenjang</b></label></td>
                <td>:</td>
                <td>
                    <select name="jp_input" id="jp_id">
                        <option value="" selected>------Pilih------</option>
                        <option value="S1">Tamat S1</option>
                        <option value="S2">Tamat S2</option>
                        <option value="S3">Tamat S3</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label for="kritik_saran"><b>Kritik & Saran</b></label></td>
                <td>:</td>
                <td>
                    <textarea id="kritik_saran" name="kritik_saran" rows="4"></textarea>
                </td>
            </tr>
        </table>

        <div class="btn-group">
            <button type="submit" class="btn-kit">Keep in Touch!</button>
        </div>
    </form>
</div>

<script>
    function previewImage(event) {
        var reader = new FileReader();
        reader.onload = function() {
            var output = document.getElementById('preview-foto');
            var label = document.getElementById('label-foto');
            output.src = reader.result;
            output.style.display = 'block'; 
            label.style.display = 'none'; 
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    function resetPreview() {
        document.getElementById('preview-foto').style.display = 'none';
        document.getElementById('label-foto').style.display = 'block';
    }
</script>

</body>
</html>
